<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocab Reveal Standalone</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
	html,
	body {
	  width: 100%;
	  height: 100%;
    overflow:hidden;
	}

	body {
	  font-family: Arial, sans-serif;
	  background: #ffffff;
	  margin: 0;
	  display: flex;
	  justify-content: center;
	  align-items: center;
	}

	.vocab-card {
	  width: 100%;
	  max-width: 900px;
	  min-height: 100%;
	  background: #ffffff;
	  border-radius: 14px;
	  display: flex;
	  flex-direction: column;
	  justify-content: center;
	  align-items: center;
	  padding: 20px;
	}

    .containermov {
      display: flex;
      justify-content: center;
      gap: 0px;
      flex-wrap: wrap;
      max-width: 100%;
    }

    .circle {
      flex: 1 1 100px;
      max-width: 77px;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background-color: white;
      border: 2px solid gray;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .circle:hover {
      transform: scale(1.1);
    }
	  p {width: 600px}
    .circle img {
      max-width: 77px;
      max-height: 77px;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .circle.revealed img {
      opacity: 1;
    }

	.circle.revealed {
	  background-color: transparent;
	  border: 2px solid transparent;
	}

    .group-left,
    .group-right {
      display: flex;
      gap: 8px;
    }

    .group-right {
      margin-left: 100px;
    }

    .group-center {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 10px;
	  margin-top: 20px;
	  margin-bottom: 13px;
		
    }

    .btnCC {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 8px 40px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s ease;
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 15%;
      min-width: 110px;
    }

    .btnCC:hover {
      background-color: #1976d2;
    }

    .btnCC i {
      font-size: 20px;
    }

    .final-image {
      margin-bottom: 60px;
      text-align: center;
      display: none;
      width: 100%;
    }

    .final-image img {
      max-width: 60%;
      height: auto;
      border-radius: 12px;
    }

	.vocab-word {
	  display: block;
	  width: fit-content;
	  margin: 107px auto 26px; /* 🔥 esto lo centra bien */
	  padding: 6px 16px;
	  border-radius: 10px;
	  background: #fdeaea;
	  color: #e53935;
	  font-size: 46px;
	  font-weight: 700;
	  text-decoration: underline;
	  text-decoration-color: #e53935;
	  text-underline-offset: 6px;
	  text-decoration-thickness: 3px;
	  margin-bottom: 100px;
	}

  

  /* Información de la palabra */
.word-information {
	  width: calc(100% + 40px);
	  margin: 120px -20px -20px;
	  padding: 22px 34px;
	  box-sizing: border-box;

	  background: #eaf3ff;
	  color: #111;

	  font-size: 23px;
	  line-height: 1.35;
	  text-align: left;
	}

	.word-information p {
	  margin: 0 0 14px;
	}

	.word-information p:last-child {
	  margin-bottom: 0;
	}

	.word-information strong {
	  font-weight: 700;
	}
	  
	  
	.library-button{
	  position:absolute;
	  right:28px;
	  bottom:28px;

	  width:52px;
	  height:52px;

	  border:none;
	  border-radius:50%;

	  background:#2f70dc;
	  color:#fff;

	  font-size:22px;
	  cursor:pointer;

	  box-shadow:0 4px 10px rgba(0,0,0,.18);

	  transition:.2s;
	}

	.library-button:hover{
	  transform:scale(1.08);
	}

	.library-popup{

	  position:fixed;
	  inset:0;

	  background:rgba(0,0,0,.65);

	  display:flex;
	  justify-content:center;
	  align-items:center;

	  opacity:0;
	  visibility:hidden;

	  transition:.2s;

	  z-index:9999;
	}

	.library-popup.open{

	  opacity:1;
	  visibility:visible;
	}

	.library-popup img{

	  width:min(90vw,700px);

	  border-radius:14px;

	  box-shadow:0 18px 50px rgba(0,0,0,.45);
	}

.library-close {
  position: absolute;
  top: 14px;
  right: 14px;

  width: 58px;
  height: 58px;

  display: flex;
  align-items: center;
  justify-content: center;

  padding: 0;
  border: none;
  border-radius: 50%;

  background: #f44747;
  color: #ffffff;

  font-family: Arial, sans-serif;
  font-size: 34px;
  font-weight: 700;
  line-height: 1;

  cursor: pointer;

  box-shadow:
    0 8px 20px rgba(0, 0, 0, 0.20),
    0 2px 6px rgba(0, 0, 0, 0.12);

  transition:
    transform 0.18s ease,
    background-color 0.18s ease;
}

.library-close:hover {
  background: #e93b3b;
  transform: scale(1.07);
}

.library-close:active {
  transform: scale(0.96);
}

  </style>
</head>
<body>
  <div class="vocab-card">
	  <div class="vocab-word">uniforms</div>
    <div class="containermov">
      <div class="group-left">
        <div class="circle" onclick="toggleImage(this)" data-index="0" data-reveal="0"><img src="CC/CC-18.png" alt="Imagen 1"></div>
        <div class="circle" onclick="toggleImage(this)" data-index="1" data-reveal="1"><img src="CC/CC-30.png" alt="Imagen 2"></div>
        <div class="circle" onclick="toggleImage(this)" data-index="2" data-reveal="2"><img src="CC/CC-06.png" alt="Imagen 3"></div>
        <div class="circle" onclick="toggleImage(this)" data-index="3" data-reveal="3"><img src="CC/CC-31.png" alt="Imagen 4"></div>
        <div class="circle" onclick="toggleImage(this)" data-index="4" data-reveal="4"><img src="CC/CC-14.png" alt="Imagen 5"></div>
        <div class="circle" onclick="toggleImage(this)" data-index="5" data-reveal="5"><img src="CC/CC-40.png" alt="Imagen 6"></div>
        <div class="circle" onclick="toggleImage(this)" data-index="6" data-reveal="6"><img src="CC/CC-29.png" alt="Imagen 7"></div>
        <div class="circle" onclick="toggleImage(this)" data-index="6" data-reveal="7"><img src="CC/CC-26.png" alt="Imagen 8"></div>
      </div>

      <div class="group-center">
        <button class="btnCC" onclick="playAudio('audios/uniforms.mp3')">
          <i class="fas fa-volume-up"></i>
        </button>
      </div>
	<button class="library-button" onclick="openLibraryImage()">
	  <i class="fas fa-images"></i>
	</button>
      <div class="word-information">
        <p>
          <strong>Def.</strong> Special clothes that people wear for work, school, or sports.
        </p>

        <p>
          <strong>Ex.</strong> The players wear new uniforms for every game. 
        </p>
      </div>
    </div>
  </div>
<div id="libraryPopup" class="library-popup">

<button
  class="library-close"
  onclick="closeLibraryImage()"
  aria-label="Close image">
  <i class="fa-solid fa-xmark"></i>
</button>

  <img
    src="imagen/uniforms.png"
    alt="Uniforms">

</div>
  <script>
    const vocabRevealState = {};

    function toggleImage(el) {
      const card = el.closest('.vocab-card');
      const circles = card.querySelectorAll('.circle');
      const revealAttr = el.getAttribute('data-reveal');
      const revealIndices = revealAttr ? revealAttr.split(',').map(Number) : [];
      const cardIndex = Array.from(document.querySelectorAll('.vocab-card')).indexOf(card);

      if (!vocabRevealState[cardIndex]) {
        vocabRevealState[cardIndex] = new Set();
      }

      const revealedSet = vocabRevealState[cardIndex];
      const revealedCount = revealedSet.size;
      const groupStart = Math.min(...revealIndices);
      const groupEnd = Math.max(...revealIndices);
      const allGroupRevealed = revealIndices.every(idx => circles[idx]?.classList.contains('revealed'));

      if (!allGroupRevealed) {
        if (groupStart !== revealedCount) return;

        revealIndices.forEach(idx => {
          revealedSet.add(idx);
          circles[idx]?.classList.add('revealed');
        });
      } else {
        if (groupEnd !== revealedCount - 1) return;

        revealIndices.forEach(idx => {
          revealedSet.delete(idx);
          circles[idx]?.classList.remove('revealed');
        });
      }

      const finalImage = card.querySelector('.final-image');
      if (revealedSet.size === circles.length) {
        if (finalImage) finalImage.style.display = 'block';
      } else {
        if (finalImage) finalImage.style.display = 'none';
      }
    }

    function resetImageReveal() {
      const card = document.querySelector('.vocab-card');
      if (!card) return;

      card.querySelectorAll('.circle').forEach(c => c.classList.remove('revealed'));
    }

    function adjustGridColumns() {
      document.querySelectorAll('.containermov').forEach(container => {
        const totalCircles = container.querySelectorAll('.circle').length;
        const columns = Math.min(totalCircles, 6);
        container.style.display = 'grid';
        container.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
        container.style.gap = '10px';
      });
    }

    function playAudio(file) {
      const audio = new Audio(file);
      audio.play();
    }

    function setupStackedCircles() {
      document.querySelectorAll('.vocab-card .group-left').forEach(container => {
        const circles = Array.from(container.querySelectorAll('.circle'));
        const groups = {};

        circles.forEach(el => {
          const key = (el.dataset.reveal || '').replace(/\s+/g, '');
          if (key.includes(',')) (groups[key] ||= []).push(el);
        });

        Object.values(groups).forEach(arr => {
          arr.forEach(c => {
            c.style.marginRight = '';
            c.style.marginLeft = '';
            c.style.zIndex = '';
          });

			if (arr.length >= 2) {
			  arr[1].style.marginLeft = '-60px';

			  // Imagen 2 arriba de Imagen 3
			  arr[0].style.zIndex = '3';
			  arr[1].style.zIndex = '2';

			  arr[1].style.marginRight = '0px';
			}
        });
      });
    }

    document.addEventListener('DOMContentLoaded', setupStackedCircles);

function openLibraryImage() {

  document
    .getElementById("libraryPopup")
    .classList
    .add("open");

  window.top.postMessage({
    type: "library-image-open"
  }, "*");
}

function closeLibraryImage() {

  document
    .getElementById("libraryPopup")
    .classList
    .remove("open");

  window.top.postMessage({
    type: "library-image-close"
  }, "*");
}
  </script>
</body>
</html>
